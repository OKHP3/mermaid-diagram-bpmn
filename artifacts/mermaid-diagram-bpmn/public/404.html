<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>BPMN for Mermaid</title>
  <script>
    // SPA redirect for GitHub Pages
    // When a route like /mermaid-diagram-bpmn/playground is hit, GitHub Pages
    // serves this 404.html. The script encodes the path and redirects to the
    // base index.html, which then restores the real URL via history.replaceState.
    //
    // pathSegmentsToKeep = number of path segments in the GitHub Pages base:
    //   /mermaid-diagram-bpmn  →  1 segment to keep
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
