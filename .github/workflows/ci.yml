name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm --filter @workspace/mermaid-diagram-bpmn run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        env:
          PORT: "15173"
          BASE_PATH: /mermaid-diagram-bpmn/
          NODE_ENV: production
        run: pnpm --filter @workspace/mermaid-diagram-bpmn run build
